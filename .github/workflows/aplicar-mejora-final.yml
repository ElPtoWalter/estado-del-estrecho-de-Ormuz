name: Aplicar mejora final Ormuz V3.1

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: patch-hormuz-v31
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Descargar repositorio completo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Aplicar parche seguro y ejecutar pruebas
        run: python aplicar_mejora_final_ormuz.py --apply

      - name: Comprobar el diff
        run: |
          git diff --check
          git status --short

      - name: Guardar únicamente los archivos del motor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add             update_status.py             evidence_guard.py             source_aliases.json             test_decision_engine.py             tests/test_final_guard.py

          if git diff --cached --quiet; then
            echo "La mejora ya estaba aplicada."
          else
            git commit -m "Refuerza atribución y validación editorial V3.1"
            git push
          fi

      - name: Lanzar comprobación completa de Ormuz
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run update-status.yml --ref main
