name: Actualizar estado de Ormuz

on:
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-hormuz-status
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Probar el motor de decisión
        run: python -m unittest -v test_decision_engine.py

      - name: Comprobar fuentes y actualizar la web
        env:
          CHANGE_FILE: ${{ runner.temp }}/ormuz-change.json
        run: python update_status.py

      - name: Conservar evidencias y preparar la portada
        run: python postprocess_evidence.py

      - name: Guardar cambios generados
        run: |
          if git diff --quiet; then
            echo "No hay cambios que guardar."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            status.json \
            history.json \
            feed.xml \
            sitemap.xml \
            index.html \
            en.html \
            historial.html \
            en-history.html
          git commit -m "Actualizar estado, historial y evidencias de Ormuz"
          git push

      - name: IndexNow y alertas opcionales
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC_URL: ${{ secrets.NTFY_TOPIC_URL }}
        run: python notify_services.py "${{ runner.temp }}/ormuz-change.json"
