name: Actualizar estado de Ormuz

on:
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-hormuz-status
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Comprobar estado
        run: python update_status.py

      - name: Guardar cambios
        run: |
          if git diff --quiet -- status.json; then
            echo "No hay cambios que guardar."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status.json
          git commit -m "Actualizar estado del estrecho de Ormuz"
          git push
