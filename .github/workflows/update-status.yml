name: Actualizar estado de Ormuz

on:
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-hormuz-status
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Probar el motor de decisión
        run: python -m unittest -v test_decision_engine.py

      - name: Probar el parte diario
        run: python -m unittest -v test_v11.py

      - name: Comprobar fuentes y actualizar la web
        env:
          CHANGE_FILE: ${{ runner.temp }}/ormuz-change.json
        run: python update_status.py

      - name: Conservar evidencias y preparar la portada
        run: python postprocess_evidence.py

      - name: Instalar y conservar mejoras V11
        run: python install_v11.py

      - name: Generar parte diario, archivo y borradores de X
        run: python generate_daily_brief.py

      - name: Guardar cambios generados
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No hay cambios que guardar."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Actualizar estado, evidencias y parte diario de Ormuz"
          git push

      - name: IndexNow y alertas opcionales
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC_URL: ${{ secrets.NTFY_TOPIC_URL }}
        run: python notify_services.py "${{ runner.temp }}/ormuz-change.json"
