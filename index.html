<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Estado actual del estrecho de Ormuz." />
  <title>Estado del estrecho de Ormuz</title>
  <style>
    :root {
      --bg: #070a0f;
      --panel: #101722;
      --text: #f5f7fa;
      --muted: #8f9bad;
      --closed: #ff4d5f;
      --open: #32d583;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 25%, rgba(255, 77, 95, 0.12), transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(92vw, 680px);
      padding: 56px 28px;
      text-align: center;
      background: rgba(16, 23, 34, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 32px;
      font-size: clamp(1.25rem, 3vw, 1.7rem);
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-size: clamp(3.5rem, 13vw, 7rem);
      font-weight: 850;
      line-height: 1;
      letter-spacing: -0.06em;
    }

    .dot {
      width: 0.24em;
      height: 0.24em;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 28px currentColor;
      animation: pulse 2s infinite;
    }

    .closed { color: var(--closed); }
    .open { color: var(--open); }

    .updated {
      margin: 28px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.84); }
    }
  </style>
</head>
<body>
  <main>
    <h1>ESTRECHO DE ORMUZ</h1>
    <div id="status" class="status closed" aria-live="polite">
      <span class="dot" aria-hidden="true"></span>
      <span id="statusText">CERRADO</span>
    </div>
    <p class="updated">Última actualización: 12 de julio de 2026</p>
  </main>

  <script>
    // Cambia esta constante por "ABIERTO" o "CERRADO" para actualizar la web.
    const estado = "CERRADO";

    const status = document.getElementById("status");
    const statusText = document.getElementById("statusText");
    const estaAbierto = estado === "ABIERTO";

    statusText.textContent = estado;
    status.classList.toggle("open", estaAbierto);
    status.classList.toggle("closed", !estaAbierto);
  </script>
</body>
</html>
